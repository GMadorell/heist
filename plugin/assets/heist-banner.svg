    <g transform="rotate(-6 110 420)">
      <circle cx="110" cy="420" r="30" fill="none" stroke="#B8863B" stroke-width="2"/>
      <circle cx="110" cy="420" r="23" fill="none" stroke="#B8863B" stroke-width="1"/>
      <text x="110" y="427" font-size="16" font-weight="700" fill="#EFE9DD">MM</text>
    </g>
    <text x="110" y="464" font-size="11" fill="#EFE9DD" opacity="0.8" letter-spacing="1">MASTERMIND</text>

    <g transform="rotate(4 306 420)">
      <circle cx="306" cy="420" r="30" fill="none" stroke="#B8863B" stroke-width="2"/>
      <circle cx="306" cy="420" r="23" fill="none" stroke="#B8863B" stroke-width="1"/>
      <text x="306" y="427" font-size="16" font-weight="700" fill="#EFE9DD">FE</text>
    </g>
    <text x="306" y="464" font-size="11" fill="#EFE9DD" opacity="0.8" letter-spacing="1">FENCE</text>

    <g transform="rotate(-3 502 420)">
      <circle cx="502" cy="420" r="30" fill="none" stroke="#B8863B" stroke-width="2"/>
      <circle cx="502" cy="420" r="23" fill="none" stroke="#B8863B" stroke-width="1"/>
      <text x="502" y="427" font-size="16" font-weight="700" fill="#EFE9DD">FO</text>
