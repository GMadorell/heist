    <line x1="341" y1="420" x2="454" y2="420"/>
    <line x1="537" y1="420" x2="650" y2="420"/>
    <line x1="733" y1="420" x2="846" y2="420"/>
    <line x1="929" y1="420" x2="1042" y2="420"/>
  </g>
  <g fill="#EFE9DD" opacity="0.4">
