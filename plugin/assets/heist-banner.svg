      <text x="698" y="427" font-size="16" font-weight="700" fill="#EFE9DD">WH</text>
    </g>
    <text x="698" y="464" font-size="11" fill="#EFE9DD" opacity="0.8" letter-spacing="1">WHEELMAN</text>

    <g transform="rotate(-5 894 420)">
      <circle cx="894" cy="420" r="30" fill="none" stroke="#B8863B" stroke-width="2"/>
      <circle cx="894" cy="420" r="23" fill="none" stroke="#B8863B" stroke-width="1"/>
      <text x="894" y="427" font-size="16" font-weight="700" fill="#EFE9DD">MU</text>
    </g>
    <text x="894" y="464" font-size="11" fill="#EFE9DD" opacity="0.8" letter-spacing="1">MUSCLE</text>

    <g transform="rotate(3 1090 420)">
      <circle cx="1090" cy="420" r="30" fill="none" stroke="#B8863B" stroke-width="2"/>
      <circle cx="1090" cy="420" r="23" fill="none" stroke="#B8863B" stroke-width="1"/>
      <text x="1090" y="427" font-size="16" font-weight="700" fill="#EFE9DD">CL</text>
    </g>
    <text x="1090" y="464" font-size="11" fill="#EFE9DD" opacity="0.8" letter-spacing="1">CLEANER</text>
